  <title>Jeopardy!</title>

  <link rel="stylesheet" href="/date/style.css">
</head>
<body>
  <h1>
    Jeapordy! Date Picker
  </h1>
  
  <div class="link">
    <a href="" id="game-url" target="blank"></a>
  </div>
  
  <form>
    <label>Game Date:</label>
    <input type="date" id="date-picker">
    
    <label>Round:</label>
    <select id="round-picker">
      <option value="1" default>1</option>
      <option value="2">2</option>
    </select>
    
    <button type="submit">
      Play this game
    </button>
  </form>
  
  <script src="/date/script.js" type="module"></script>
</body>
